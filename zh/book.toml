[book]
title = "Skill 设计之书"
authors = ["Atum <https://atum.li>"]
description = "如何编写 SKILL.md — 从 ClawHub 下载量前 1,000 名的 Skill 中提炼出的设计哲学、方法论与模式。"
language = "zh"
multilingual = false
src = "book"

[build]
build-dir = "../_book/zh"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/A7um/SkillDesignBook"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/A7um/SkillDesignBook/edit/main/{path}"
site-url = "/SkillDesignBook/zh/"
additional-css = ["../theme/custom.css"]
additional-js = ["../theme/lang-switch.js"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
