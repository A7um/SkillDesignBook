[book]
title = "The Skill Design Book"
authors = ["Atum <https://atum.li>"]
description = "How to Write SKILL.md — philosophy, methodology, and patterns extracted from the top 1,000 most-downloaded ClawHub skills."
language = "en"
multilingual = false
src = "book"

[build]
build-dir = "_book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/A7um/SkillDesignBook"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/A7um/SkillDesignBook/edit/main/{path}"
site-url = "/SkillDesignBook/"
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
